# ==========================================================
# rules（从源文件直接提取）
# ----------------------------------------------------------
# 原始规则列表，默认注释不启用。
# 常用操作：
#   +rules: [...]   在规则列表开头插入（优先匹配）
#   rules+: [...]   在规则列表末尾追加
#   rules!: [...]   强制替换整个规则列表（丢弃原有规则）
# 参考上方示例，通常不需要取消注释整个 rules，而是用 +rules/rules+ 追加即可。
# ==========================================================
#
# rules:
# - SUB-RULE,(DST-PORT,5228-5230),fcm_rules
# - DST-PORT,1337/2710/6881-6999/7777,下载追踪
