# OpenClash 覆写模块 - config.yaml
# 生成日期：2026-04-10
# 源文件：https://raw.githubusercontent.com/wanghe1531/mihomo_yamls/main/THEYAMLS/Mobile_Modules/ClashMix/config.yaml
# 格式：新版 OpenClash [YAML] 块覆写
#
# 本文件仅包含 [YAML] 块覆写内容，不含任何 [General] 插件设置。
# 所有内容默认注释，不影响现有配置；取消注释对应段落即可启用该覆写。
# ==========================================================
# [YAML] 是新版 OpenClash 覆写模块的识别标记
# 此行本身不可注释，内容写在此标记之后
# 注释状态不生效；取消注释后重载覆写模块即可生效
# ==========================================================
[YAML]

# ==========================================================
# 操作符速查
# ----------------------------------------------------------
#  key       默认合并：Hash 递归合并，其他类型直接覆盖原值
#  key!      强制覆盖：整个值全部替换，不做任何合并
#  key+      数组后置追加：在数组末尾加入新元素
#  +key      数组前置插入：在数组开头插入（规则越靠前越优先匹配）
#  key-      数组差集删除：从数组移除指定元素；非数组则删除该键
#  key*      批量条件更新：配合 where/set，按条件匹配后批量修改
# ==========================================================

# ==========================================================
# 示例：追加自定义 rule-provider 并在规则末尾加入对应规则
# 取消注释后，Steam 流量将走 Proxy 策略组
# ----------------------------------------------------------
# +rule-providers:
#   Steam:
#     type: http
#     behavior: domain
#     format: mrs
#     url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/steam.mrs"
#     interval: 86400
# +rules:
#   - RULE-SET,Steam,Proxy
# ==========================================================

# ==========================================================
# 示例：在规则列表最前面插入高优先级规则（最先匹配）
# ----------------------------------------------------------
# +rules:
#   - DOMAIN-SUFFIX,example.com,DIRECT
#   - IP-CIDR,192.168.0.0/16,DIRECT,no-resolve
# ==========================================================

# ==========================================================
# 示例：强制替换整个 rules 数组（原有规则全部丢弃）
# ----------------------------------------------------------
# rules!:
#   - DOMAIN-SUFFIX,example.com,DIRECT
#   - MATCH,PROXY
# ==========================================================

# ==========================================================
# 示例：修改 dns 配置中的部分字段，其余字段保持不变
# ----------------------------------------------------------
# dns:
#   enable: true
#   cache-algorithm: lru
# ==========================================================

# ==========================================================
# 示例：给所有 url-test 类型的策略组在 proxies 末尾追加节点
# ----------------------------------------------------------
# proxy-groups*:
#   where:
#     type: url-test
#   set:
#     proxies+:
#       - '节点名称'
# ==========================================================

# ==========================================================
# proxy-providers（从源文件直接提取）
# ----------------------------------------------------------
# 以下内容原样复制自源 YAML 的 proxy-providers 块。
# 使用方法：
#   1. 将需要替换的 provider 的 url: 改为你自己的订阅链接
#   2. 删除这整块前面的 # 号，保存后重载覆写模块即可
# ==========================================================
#
# proxy-providers:
#   机场1:
#     health-check: &id001
#       enable: true
#       expected-status: 204
#       interval: 900
#       lazy: true
#       timeout: 3000
#       url: https://www.gstatic.com/generate_204
#     interval: 21600
#     path: ./proxy_providers/机场1.yaml
#     type: http
#     url: 订阅链接
#   机场2:
#     health-check: *id001
#     interval: 21600
#     path: ./proxy_providers/机场2.yaml
#     type: http
#     url: 订阅链接
#   机场3:
#     health-check: *id001
#     interval: 21600
#     path: ./proxy_providers/机场3.yaml
#     type: http
#     url: 订阅链接

# ==========================================================
# proxy-groups（从源文件直接提取）
# ----------------------------------------------------------
# 原始策略组配置，默认注释不启用。
# 如需覆写策略组，可取消注释后修改，或参考上方示例使用 proxy-groups* 条件更新。
# 直接取消注释将强制替换整个 proxy-groups（等同于 proxy-groups! 操作）。
# ==========================================================
#
# proxy-groups:
# - name: 代理
#   proxies:
#   - 自动切换
#   - 智能选择
#   type: select
# - expected-status: 204
#   filter: 美国|USA|美國|us|US|United States
#   include-all: true
#   interval: 300
#   lazy: true
#   max-failed-times: 5
#   name: 自动切换
#   timeout: 3000
#   type: fallback
#   url: https://www.gstatic.com/generate_204
# - collectdata: false
#   filter: 美国|USA|美國|us|US|United States
#   include-all: true
#   name: 智能选择
#   policy-priority: US:1.2,美国:0.9
#   prefer-asn: true
#   strategy: sticky-sessions
#   type: smart
#   uselightgbm: true
# - name: 广告
#   proxies:
#   - REJECT-DROP
#   - PASS
#   type: select
# - name: 中国网站
#   proxies:
#   - DIRECT
#   - 代理
#   type: select

# ==========================================================
# rule-providers（从源文件直接提取）
# ----------------------------------------------------------
# 原始规则集配置，默认注释不启用。
# 如需追加新的 rule-provider，参考上方示例一使用 +rule-providers: 操作符。
# ==========================================================
#
# rule-providers:
#   userDirect:
#     behavior: classical
#     path: ./rule_providers/userDirect.yaml
#     type: file
#   userProxy:
#     behavior: classical
#     path: ./rule_providers/userProxy.yaml
#     type: file
#   秋风广告规则:
#     behavior: classical
#     format: yaml
#     interval: 86400
#     path: ./rule_providers/AWAvenue-Ads-Rule-Clash.yaml
#     type: http
#     url: https://raw.githubusercontent.com/TG-Twilight/AWAvenue-Ads-Rule/refs/heads/main/Filters/AWAvenue-Ads-Rule-Clash-Classical.yaml

# ==========================================================
# rules（从源文件直接提取）
# ----------------------------------------------------------
# 原始规则列表，默认注释不启用。
# 常用操作：
#   +rules: [...]   在规则列表开头插入（优先匹配）
#   rules+: [...]   在规则列表末尾追加
#   rules!: [...]   强制替换整个规则列表（丢弃原有规则）
# 参考上方示例，通常不需要取消注释整个 rules，而是用 +rules/rules+ 追加即可。
# ==========================================================
#
# rules:
# - RULE-SET,userProxy,代理
# - RULE-SET,userDirect,中国网站
# - GEOSITE,googlefcm,DIRECT
# - GEOSITE,private,DIRECT
# - GEOIP,private,DIRECT
# - RULE-SET,秋风广告规则,广告
# - GEOSITE,CN,中国网站
# - GEOIP,CN,中国网站,no-resolve
# - MATCH,代理

# ==========================================================
# dns（从源文件直接提取）
# ----------------------------------------------------------
# 原始 DNS 配置，默认注释不启用。
# 如只需修改部分字段，直接写需要修改的键值即可（默认合并，不影响其他字段）。
# 如需完整替换 DNS 配置，使用 dns!: 操作符。
# ==========================================================
#
# dns:
#   enable: true
#   enhanced-mode: redir-host
#   ipv6: true
#   ipv6-timeout: 300
#   nameserver:
#   - https://cloudflare-dns.com/dns-query#代理
#   - https://dns.google/dns-query#代理
#   nameserver-policy:
#     geosite:cn,private,googlefcm:
#     - https://dns.alidns.com/dns-query#中国网站
