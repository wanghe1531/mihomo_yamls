# ==========================================================
# rule-providers（从源文件直接提取）
# ----------------------------------------------------------
# 原始规则集配置，默认注释不启用。
# 如需追加新的 rule-provider，参考上方示例一使用 +rule-providers: 操作符。
# ==========================================================
#
# rule-providers:
#   AWAvenue:
#     behavior: classical
#     format: yaml
#     interval: 60480
#     path: ./rule_providers/AWAvenue-Ads-Rule-Clash.yaml
#     type: http
#     url: https://gcore.jsdelivr.net/gh/TG-Twilight/AWAvenue-Ads-Rule@main/Filters/AWAvenue-Ads-Rule-Clash-Classical.yaml

# ==========================================================
# rules（从源文件直接提取）
# ----------------------------------------------------------
# 原始规则列表，默认注释不启用。
# 常用操作：
#   +rules: [...]   在规则列表开头插入（优先匹配）
#   rules+: [...]   在规则列表末尾追加
#   rules!: [...]   强制替换整个规则列表（丢弃原有规则）
# 参考上方示例，通常不需要取消注释整个 rules，而是用 +rules/rules+ 追加即可。
# ==========================================================
#
# rules:
# - AND,((NOT,((OR,((PROCESS-NAME,mihomo),(PROCESS-NAME,ClashMeta))))),(DST-PORT,853)),屏蔽
# - GEOSITE,category-httpdns-cn,屏蔽
# - RULE-SET,AWAvenue,屏蔽
# - IP-CIDR,203.107.1.0/24,屏蔽,no-resolve
# - GEOSITE,private,国内分流
# - GEOSITE,connectivity-check,国内分流
# - GEOSITE,googlefcm,国内分流
# - GEOSITE,category-games@cn,国内分流
# - GEOSITE,cn,国内分流
# - GEOIP,PRIVATE,国内分流,no-resolve
# - GEOIP,cn,国内分流,no-resolve
# - GEOSITE,category-ai-!cn,AI分流
# - GEOSITE,geolocation-!cn,代理设置
# - MATCH,代理设置

