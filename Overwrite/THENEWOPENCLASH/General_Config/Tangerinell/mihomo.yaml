# ==========================================================
# rules（从源文件直接提取）
# ----------------------------------------------------------
# 原始规则列表，默认注释不启用。
# 常用操作：
#   +rules: [...]   在规则列表开头插入（优先匹配）
#   rules+: [...]   在规则列表末尾追加
#   rules!: [...]   强制替换整个规则列表（丢弃原有规则）
# 参考上方示例，通常不需要取消注释整个 rules，而是用 +rules/rules+ 追加即可。
# ==========================================================
#
# rules:
# - RULE-SET,private_geosite,DIRECT
# - RULE-SET,private_geoip,DIRECT
# - RULE-SET,SteamCN_geosite,China
# - RULE-SET,Steam_geosite,Steam
# - RULE-SET,Ex_Epic,Epic
# - RULE-SET,Telegram_geosite,Telegram
# - RULE-SET,Telegram_geoip,Telegram
# - RULE-SET,Spotify_geosite,Spotify
# - RULE-SET,Instagram_geosite,Instagram
# - RULE-SET,GitHub_geosite,GitHub
# - RULE-SET,PikPak_geosite,PikPak
# - RULE-SET,Discord_geosite,Discord
# - RULE-SET,TikTok_geosite,TikTok
