# - RULE-SET,CN_geosite,China
# - RULE-SET,CN_geoip,China
# - MATCH,🌐其他

# ==========================================================
# dns（从源文件直接提取）
# ----------------------------------------------------------
# 原始 DNS 配置，默认注释不启用。
# 如只需修改部分字段，直接写需要修改的键值即可（默认合并，不影响其他字段）。
# 如需完整替换 DNS 配置，使用 dns!: 操作符。
# ==========================================================
#
# dns:
#   cache-algorithm: arc
#   default-nameserver:
#   - 1.1.1.1
#   - 8.8.8.8
#   - 2606:4700:4700::1111
#   - 2001:4860:4860::8888
#   enable: true
#   enhanced-mode: fake-ip
#   fake-ip-filter:
#   - RULE-SET,private_geosite,real-ip
#   - MATCH,fake-ip
#   fake-ip-filter-mode: rule
#   fake-ip-range: 198.18.0.1/16
#   ipv6: true
#   listen: 0.0.0.0:53
#   nameserver:
#   - https://cloudflare-dns.com/dns-query
#   - https://dns.google/dns-query
#   - https://dns.alidns.com/dns-query
#   - https://doh.pub/dns-query
#   prefer-h3: false
#   proxy-server-nameserver:
#   - https://cloudflare-dns.com/dns-query
#   - https://dns.google/dns-query
#   - https://dns.alidns.com/dns-query
#   - https://doh.pub/dns-query
