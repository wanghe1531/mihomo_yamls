# OpenClash 覆写模块 - mihomo.yaml
# 生成日期：2026-07-10
# 源文件：https://raw.githubusercontent.com/wanghe1531/mihomo_yamls/main/THEYAMLS/General_Config/loneshu7/mihomo.yaml
# 格式：新版 OpenClash [YAML] 块覆写
#
# 本文件仅包含 [YAML] 块覆写内容，不含任何 [General] 插件设置。
# 所有内容默认注释，不影响现有配置；取消注释对应段落即可启用该覆写。
# ==========================================================
# [YAML] 是新版 OpenClash 覆写模块的识别标记
# 此行本身不可注释，内容写在此标记之后
# 注释状态不生效；取消注释后重载覆写模块即可生效
# ==========================================================
[YAML]

# ==========================================================
# 操作符速查
# ----------------------------------------------------------
#  key       默认合并：Hash 递归合并，其他类型直接覆盖原值
#  key!      强制覆盖：整个值全部替换，不做任何合并
#  key+      数组后置追加：在数组末尾加入新元素
#  +key      数组前置插入：在数组开头插入（规则越靠前越优先匹配）
#  key-      数组差集删除：从数组移除指定元素；非数组则删除该键
#  key*      批量条件更新：配合 where/set，按条件匹配后批量修改
# ==========================================================

# ==========================================================
# 示例：追加自定义 rule-provider 并在规则末尾加入对应规则
# 取消注释后，Steam 流量将走 Proxy 策略组
# ----------------------------------------------------------
# +rule-providers:
#   Steam:
#     type: http
#     behavior: domain
#     format: mrs
#     url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/steam.mrs"
#     interval: 86400
# +rules:
#   - RULE-SET,Steam,Proxy
# ==========================================================

# ==========================================================
# 示例：在规则列表最前面插入高优先级规则（最先匹配）
# ----------------------------------------------------------
# +rules:
#   - DOMAIN-SUFFIX,example.com,DIRECT
#   - IP-CIDR,192.168.0.0/16,DIRECT,no-resolve
# ==========================================================

# ==========================================================
# 示例：强制替换整个 rules 数组（原有规则全部丢弃）
# ----------------------------------------------------------
# rules!:
#   - DOMAIN-SUFFIX,example.com,DIRECT
#   - MATCH,PROXY
# ==========================================================

# ==========================================================
# 示例：修改 dns 配置中的部分字段，其余字段保持不变
# ----------------------------------------------------------
# dns:
#   enable: true
#   cache-algorithm: lru
# ==========================================================

# ==========================================================
# 示例：给所有 url-test 类型的策略组在 proxies 末尾追加节点
# ----------------------------------------------------------
# proxy-groups*:
#   where:
#     type: url-test
#   set:
#     proxies+:
#       - '节点名称'
# ==========================================================

# ==========================================================
# proxy-providers（从源文件直接提取）
# ----------------------------------------------------------
# 以下内容原样复制自源 YAML 的 proxy-providers 块。
# 使用方法：
#   1. 将需要替换的 provider 的 url: 改为你自己的订阅链接
#   2. 删除这整块前面的 # 号，保存后重载覆写模块即可
# ==========================================================
#
# proxy-providers:
#   LandNode:
#     health-check: &id001
#       enable: true
#       expected-status: 204
#       interval: 300
#       lazy: true
#       timeout: 5000
#       url: https://www.gstatic.com/generate_204
#     interval: 43200
#     override:
#       additional-prefix: 🔗
#       dialer-proxy: 中转
#     path: ./proxy_provider/LandNode.yaml
#     type: file
#   OtherNode:
#     health-check: *id001
#     interval: 43200
#     path: ./proxy_provider/OtherNode.yaml
#     type: file
#   机场1:
#     filter: ^(?!.*(?i)(?:NEVER_MATCH)).*$
#     health-check: *id001
#     interval: 43200
#     override:
#       additional-prefix: 机场标识
#     path: ./proxy_provider/providers_1.yaml
#     proxy: Proxies
#     type: http
#     url: 在此填入第1个机场的订阅链接(Clash/mihomo 格式)
#   机场2:
#     filter: ^(?!.*(?i)(?:NEVER_MATCH)).*$
#     health-check: *id001
#     interval: 43200
#     override:
#       additional-prefix: 机场标识
#     path: ./proxy_provider/providers_2.yaml
#     proxy: Proxies
#     type: http
#     url: 在此填入第2个机场的订阅链接(Clash/mihomo 格式)

