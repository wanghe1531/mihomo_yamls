#   fake-ip-range: 198.18.0.1/16
#   ipv6: true
#   nameserver:
#   - https://dns.cloudflare.com/dns-query#默认代理
#   - https://dns.google/dns-query#默认代理
#   nameserver-policy:
#     rule-set:cn: &id001
#     - https://dns.alidns.com/dns-query#DIRECT
#     - https://doh.pub/dns-query#DIRECT
