pr: &pr {type: select, proxies: [香港, 新加坡, 日本, 美国, 其他]}
p: &p {type: http, interval: 86400, proxy: DIRECT, header: {User-Agent: ["clash-verge/v2.5.0"]}, health-check: {enable: true, url: "https://www.gstatic.com/generate_204", interval: 300, lazy: false}}
check: &check {url: "https://www.gstatic.com/generate_204", interval: 300, lazy: false}

proxy-providers:
  provider1:
    <<: *p
    url: "此处填入订阅"
    path: ./proxy_providers/provider1.yaml

mixed-port: 7890
log-level: error
ipv6: true
allow-lan: false

external-controller: "127.0.0.1:9090"
external-ui: ui
external-ui-url: "https://github.com/Zephyruso/zashboard/releases/latest/download/dist.zip"

unified-delay: false
tcp-concurrent: true

profile:
  store-selected: true
  store-fake-ip: true

tun:
  enable: true
  stack: system  # 如有问题可使用gvisor
  mtu: 1500
  dns-hijack:
    - "udp://any:53"
    - "tcp://any:53"
  auto-route: true
  auto-detect-interface: true
  disable-icmp-forwarding: true

dns:
  enable: true
  ipv6: true
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter:
    - "+.market.xiaomi.com"
    - "lancache.steamcontent.com"
    - "rule-set:private"
  default-nameserver:
    - https://223.6.6.6/dns-query
  proxy-server-nameserver:
    - https://dns.alidns.com/dns-query
  nameserver:
    - 223.5.5.5
  nameserver-policy:
    "www.gstatic.com": ["system", "119.29.29.29"]
    "rule-set:private": ["system"]
    "rule-set:gfw": ["https://dns.google/dns-query#代理"]
    "rule-set:china-list,cn": ["223.5.5.5"]

hosts:
  "dns.alidns.com": ["223.5.5.5", "223.6.6.6"]
  "dns.google": ["8.8.8.8", "8.8.4.4"]

proxy-groups:
  - {name: 香港, type: select, include-all: true, filter: "(?i)香港|hk", <<: *check, icon: "https://fastly.jsdelivr.net/gh/Koolson/Qure/IconSet/Color/Hong_Kong.png"}
  - {name: 新加坡, type: select, include-all: true, filter: "(?i)新加坡|sg", <<: *check, icon: "https://fastly.jsdelivr.net/gh/Koolson/Qure/IconSet/Color/Singapore.png"}
  - {name: 日本, type: select, include-all: true, filter: "(?i)日本|jp", <<: *check, icon: "https://fastly.jsdelivr.net/gh/Koolson/Qure/IconSet/Color/Japan.png"}
  - {name: 美国, type: select, include-all: true, filter: "(?i)美国|us", <<: *check, icon: "https://fastly.jsdelivr.net/gh/Koolson/Qure/IconSet/Color/United_States.png"}
  - {name: 其他, type: select, include-all: true, exclude-filter: "(?i)剩余|到期|香港|hk|新加坡|sg|日本|jp|美国|us", <<: *check, icon: "https://fastly.jsdelivr.net/gh/Koolson/Qure/IconSet/Color/Server.png"}

  - {name: 代理, <<: [*pr, *check], default-selected: 香港, icon: "https://fastly.jsdelivr.net/gh/Koolson/Qure/IconSet/Color/Proxy.png"}
  - {name: AI, <<: [*pr, *check], default-selected: 美国, icon: "https://fastly.jsdelivr.net/gh/Koolson/Qure/IconSet/Color/ChatGPT.png"}
  - {name: TG, <<: [*pr, *check], default-selected: 香港, icon: "https://fastly.jsdelivr.net/gh/Koolson/Qure/IconSet/Color/Telegram_X.png"}

rules:
  - AND,((NETWORK,UDP),(DST-PORT,443),(RULE-SET,youtube)),REJECT  # 屏蔽YouTube QUIC流量
  - DOMAIN,abyss.cyapi.cn,REJECT  # 彩云天气去广告(以下三条)
  - DOMAIN,ad.cyapi.cn,REJECT
  - DOMAIN,gather.colorfulclouds.net,REJECT
  - RULE-SET,private,DIRECT
  - RULE-SET,private_ip,DIRECT,no-resolve
  - RULE-SET,ai,AI
  - RULE-SET,telegram,TG
  - RULE-SET,telegram_ip,TG,no-resolve
  - RULE-SET,github,代理
  - RULE-SET,twitter,代理
  - RULE-SET,youtube,代理
  - RULE-SET,google,代理
  - RULE-SET,gfw,代理
  - RULE-SET,cn,DIRECT
  - RULE-SET,cn_ip,DIRECT
  - MATCH,代理

rule-anchor:
  ip: &ip {type: http, interval: 86400, behavior: ipcidr, format: mrs, proxy: 代理}
  domain: &domain {type: http, interval: 86400, behavior: domain, format: mrs, proxy: 代理}
rule-providers:
  private:
    <<: *domain
    path: ./rule_providers/private.mrs
    url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/private.mrs"
  private_ip:
    <<: *ip
    path: ./rule_providers/private_ip.mrs
    url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geoip/private.mrs"
  ai:
    <<: *domain
    path: ./rule_providers/ai.mrs
    url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/category-ai-!cn.mrs"
  telegram:
    <<: *domain
    path: ./rule_providers/telegram.mrs
    url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/telegram.mrs"
  telegram_ip:
    <<: *ip
    path: ./rule_providers/telegram_ip.mrs
    url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geoip/telegram.mrs"
  github:
    <<: *domain
    path: ./rule_providers/github.mrs
    url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/github.mrs"
  twitter:
    <<: *domain
    path: ./rule_providers/twitter.mrs
    url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/twitter.mrs"
  youtube:
    <<: *domain
    path: ./rule_providers/youtube.mrs
    url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/youtube.mrs"
  google:
    <<: *domain
    path: ./rule_providers/google.mrs
    url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/google.mrs"
  gfw:
    <<: *domain
    path: ./rule_providers/gfw.mrs
    url: "https://raw.githubusercontent.com/wwqgtxx/clash-rules/release/gfw.mrs"
  china-list:
    <<: *domain
    path: ./rule_providers/china-list.mrs
    url: "https://raw.githubusercontent.com/wwqgtxx/clash-rules/release/direct.mrs"
  cn:
    <<: *domain
    path: ./rule_providers/cn.mrs
    url: "https://static-file-global.353355.xyz/rules/cn-additional-list.mrs"
  cn_ip:
    <<: *ip
    path: ./rule_providers/cn_ip.mrs
    url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geoip/cn.mrs"