      url: "https://www.gstatic.com/generate_204",
      interval: 120,
      tolerance: 50,
      use: [ B机场 ],
      filter: "(?i)(美国|美|US|USA|United States|America|洛杉矶|硅谷|圣何塞|西雅图|达拉斯|凤凰城|纽约|芝加哥)",
