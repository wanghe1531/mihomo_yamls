# 规则
rules:
  - RULE-SET,private,🔒 私有网络
  - RULE-SET,unban,🎯 全球直连
  - RULE-SET,myignore,DIRECT
  - RULE-SET,ads,🛑 广告拦截
  - RULE-SET,program-ads,🛑 广告拦截
  # 为过滤 P2P 流量(BT 下载)，可添加一条 `DST-PORT` 规则(ShellCrash 会默认开启“只代理常用端口”，可删除此条 `DST-PORT`)
  # - DST-PORT,6881-6889,🎯 全球直连
  - RULE-SET,download,🎯 全球直连
  - RULE-SET,google-cn,🎯 全球直连
  - RULE-SET,steam-cn,🎯 全球直连
  - RULE-SET,cn,🇨🇳 直连域名
  - RULE-SET,myproxy,🪜 代理域名
  - RULE-SET,microsoft,🪟 微软服务
  - RULE-SET,apple,🍎 苹果服务
  - RULE-SET,google,🇬 谷歌服务
  - RULE-SET,ai,🤖 人工智能
  - RULE-SET,telegram,📲 电报消息
  - RULE-SET,game-download,🎮 游戏服务
  - RULE-SET,game-epic,🎮 游戏服务
  - RULE-SET,game-origin,🎮 游戏服务
  - RULE-SET,game-sony,🎮 游戏服务
  - RULE-SET,game-steam,🎮 游戏服务
  - RULE-SET,game-nintendo,🎮 游戏服务
  - RULE-SET,game-xbox,🎮 游戏服务
  - RULE-SET,proxy,🪜 代理域名
  - RULE-SET,cnip,🇨🇳 直连 IP,no-resolve
  - MATCH,🐟 漏网之鱼
