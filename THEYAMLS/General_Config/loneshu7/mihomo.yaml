# Mihomo (Clash.Meta) advanced rules profile
ishu: &ishu
    interval: 43200
    health-check:
        enable: true
        url: 'https://www.gstatic.com/generate_204'
        interval: 300
        timeout: 5000
        lazy: true
        expected-status: 204

# Proxy Providers
# 将示例 URL 替换为自己的 Clash/mihomo 订阅地址；提交公开仓库前请保留占位文本。
# additional-prefix 会给不同机场的节点名称增加标识，便于筛选和排障。
proxy-providers:
  机场1:
    type: http
    url: "在此填入第1个机场的订阅链接"
    <<: *ishu
    path: './proxy_provider/providers_1.yaml'
    proxy: Proxies
    override:
      additional-prefix: "机场1-"
    filter: '^(?!.*(?i)(?:NEVER_MATCH)).*$'

  机场2:
    type: http
    url: "在此填入第2个机场的订阅链接"
    <<: *ishu
    path: './proxy_provider/providers_2.yaml'
    proxy: Proxies
    override:
      additional-prefix: "机场2-"
    filter: '^(?!.*(?i)(?:NEVER_MATCH)).*$'

  # 本地落地节点文件。dialer-proxy 指定其前置中转策略组。
  LandNode:
    type: file
    <<: *ishu
    path: './proxy_provider/LandNode.yaml'
    override:
      additional-prefix: "🔗"
      dialer-proxy: 中转

  # 其他不需要前置中转的本地节点文件。
  OtherNode:
    type: file
    <<: *ishu
    path: './proxy_provider/OtherNode.yaml'

# Global Configuration
mixed-port: 7890
socks-port: 0
port: 0
redir-port: 0
tproxy-port: 0
mode: rule
log-level: info
ipv6: false
find-process-mode: always
authentication: []
skip-auth-prefixes:
  - 127.0.0.1/32
  - ::1/128

allow-lan: true
lan-disallowed-ips: []
bind-address: "*"
lan-allowed-ips:
  - 0.0.0.0/0
  - ::/0

### External Controller
external-controller: 0.0.0.0:7891
external-ui: ui
secret: ""
external-ui-url: 'https://github.com/Zephyruso/zashboard/releases/latest/download/dist.zip'
external-controller-cors:
  allow-origins:
    - "*"
  allow-private-network: true

profile:
  store-selected: true
  store-fake-ip: true

unified-delay: true
tcp-concurrent: true

geodata-mode: true
geo-auto-update: false
geo-update-interval: 24
geox-url:
  geoip: 'https://github.com/Loyalsoldier/v2ray-rules-dat/releases/latest/download/geoip.dat'
  geosite: 'https://github.com/Loyalsoldier/v2ray-rules-dat/releases/latest/download/geosite.dat'
  mmdb: 'https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/country-lite.mmdb'
  asn: 'https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/GeoLite2-ASN.mmdb'

# Tunnel Configuration
# TUN 接管系统流量；DNS 劫持将 53 端口查询交给 mihomo 内置 DNS。
tun:
  enable: true
  device: mihomo
  stack: system
  dns-hijack:
    - "any:53"
    - "tcp://any:53"
  auto-route: true
  auto-detect-interface: true
  mtu: 1500
  inet6-address:
    - "fdfe:dcba:9876::1/126"
  auto-redirect: true
  strict-route: true
  endpoint-independent-nat: true
  udp-timeout: 300

# DNS Configuration
# fake-ip 模式由 mihomo 返回保留地址并在内部维护域名映射，适合 TUN 全局接管。
dns:
  enable: true
  listen: "0.0.0.0:1053"
  prefer-h3: false
  use-system-hosts: true
  ipv6: false
  cache-algorithm: arc
  respect-rules: true
  enhanced-mode: "fake-ip"
  fake-ip-range: "198.18.0.1/16"

  # 以下域名保留真实解析结果，避免局域网和系统探测域名被映射为 fake-ip。
  fake-ip-filter:
    - "*.lan"
    - "+.local"
    - "localhost.ptlogin2.qq.com"
    - "geosite:private"

  # 用于解析 DoH 服务器自身的域名，必须填写可直接访问的 IP DNS。
  default-nameserver:
    - "223.5.5.5"
    - "119.29.29.29"

  # 普通域名的主要上游 DNS。
  nameserver:
    - "https://cloudflare-dns.com/dns-query"
    - "https://dns.google/dns-query"

  # 专门解析代理节点的 server 域名，避免节点域名依赖代理链路。
  proxy-server-nameserver:
    - "https://doh.pub/dns-query"
    - "https://dns.alidns.com/dns-query"

  # 国内与私有域名优先交给国内 DNS，减少跨境解析和 CDN 偏差。
  nameserver-policy:
    "geosite:cn,private":
      - "https://doh.pub/dns-query"
      - "https://dns.alidns.com/dns-query"
    # 企业内网示例；不需要时可删除或改成自己的域名和 DNS。
    "+.internal.crop.com": "10.0.0.1"

# Sniffer Configuration
# 嗅探 TLS/HTTP/QUIC 连接中的域名，帮助仅有目标 IP 的连接正确命中域名规则。
sniffer:
  enable: true
  parse-pure-ip: true
  sniff:
    tls:
      ports: [443, 8443]
    http:
      ports: [80, 8080-8888]
      override-destination: true
    quic:
      ports: [443, 8443]
  force-domain:
    - "+"
  skip-domain:
    - "Mijia Cloud"
    - "dlg.io.mi.com"
    - "+.apple.com"

# Node Filters
# 地区正则用于复用自动选择、故障转移、负载均衡和手动策略组。
# 调整机场节点命名后，请同步检查这些包含/排除关键词。
FilterHK: &FilterHK 
  '^(?=.*((?i)(香港|🇭🇰)))(?!.*((?i)(🔗))).*$'

FilterJP: &FilterJP 
  '^(?=.*((?i)(日本|🇯🇵)))(?!.*((?i)(🔗))).*$'

FilterKR: &FilterKR 
  '^(?=.*((?i)(韩国|🇰🇷)))(?!.*((?i)(🔗))).*$'

FilterSG: &FilterSG 
  '^(?=.*((?i)(新加坡|🇸🇬)))(?!.*((?i)(🔗))).*$'

FilterUS: &FilterUS 
  '^(?=.*((?i)(美国|🇺🇸)))(?!.*((?i)(🔗))).*$'

FilterUK: &FilterUK 
  '^(?=.*((?i)(英国|🇬🇧)))(?!.*((?i)(🔗))).*$'

FilterAU: &FilterAU 
  '^(?=.*((?i)(澳大利亚|🇦🇺)))(?!.*((?i)(🔗))).*$'

FilterFR: &FilterFR 
  '^(?=.*((?i)(法国|🇫🇷)))(?!.*((?i)(🔗))).*$'

FilterDE: &FilterDE 
  '^(?=.*((?i)(德国|🇩🇪)))(?!.*((?i)(🔗))).*$'

FilterTW: &FilterTW 
  '^(?=.*((?i)(台湾|🇹🇼)))(?!.*((?i)(🔗))).*$'

FilterOthers: &FilterOthers 
  '^(?!.*((?i)(香港|🇭🇰|台湾|🇹🇼|日本|🇯🇵|新加坡|🇸🇬|美国|🇺🇸|德国|🇩🇪|英国|🇬🇧|韩国|🇰🇷|法国|🇫🇷|澳大利亚|🇦🇺)))(?!.*((?i)(🔗))).*$'

FilterExperiment: &FilterExperiment 
  '^(?=.*((?i)()))(?!.*((?i)(🔗))).*$'

FilterAll: &FilterAll 
  '^(?!.*((?i)(🔗))).*$'

# Proxy Group Templates
# YAML 锚点集中定义公共参数，下面的策略组用 << 合并，减少重复配置。
Select: &Select
  type: select
  disable-udp: false
  hidden: false
  include-all: true

Auto: &Auto
  type: url-test
  url: 'https://www.gstatic.com/generate_204'
  expected-status: 204
  interval: 300
  timeout: 5000
  lazy: true
  tolerance: 50
  disable-udp: false
  hidden: false
  include-all: true

FallBack: &FallBack
  type: fallback
  url: 'https://www.gstatic.com/generate_204'
  expected-status: 204
  interval: 300
  timeout: 5000
  lazy: true
  disable-udp: false
  hidden: false
  include-all: true

# consistent-hashing 让相同目标尽量使用同一节点；它负责分摊连接，并不等于自动选择最低延迟。
LoadBalance: &LoadBalance
  type: load-balance
  strategy: consistent-hashing
  url: 'https://www.gstatic.com/generate_204'
  expected-status: 204
  interval: 300
  timeout: 5000
  lazy: true
  disable-udp: false
  hidden: false
  use:
     - A-Kuromis #这里为了瘦斤节点池因为博主本人有多个主用和备用节点机场 负载均衡不会选择最好的机场 需要填写需要加进负载均衡的机场 比如填写proxy-providers内的“机场1”

Select_Proxies: &Select_Proxies
  type: select
  disable-udp: false
  hidden: false
  include-all: true
  proxies: [Proxies, 🧪实验低倍率, 🔗链式代理, DIRECT, ⛔阻断, 📋自动全部, 
            🟨手动选择, 🟦手动选择, 
            🟢故障转移, 🟣故障转移, 
            🔶自动选择, 🔷自动选择, 
            🔸负载均衡, 🔹负载均衡, 
            🇭🇰手动选择, 🇸🇬手动选择, 
            🇺🇸手动选择, 🇹🇼手动选择,
            🇯🇵手动选择, 🇰🇷手动选择, 
            🇦🇺手动选择, 🇬🇧手动选择, 
            🇫🇷手动选择, 🇩🇪手动选择, 
            🇭🇰自动选择, 🇸🇬自动选择, 
            🇺🇸自动选择, 🇹🇼自动选择, 
            🇯🇵自动选择, 🇰🇷自动选择, 
            🇦🇺自动选择, 🇬🇧自动选择, 
            🇫🇷自动选择, 🇩🇪自动选择, 
            🇭🇰故障转移, 🇸🇬故障转移, 
            🇺🇸故障转移, 🇹🇼故障转移, 
            🇯🇵故障转移, 🇰🇷故障转移, 
