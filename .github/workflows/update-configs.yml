name: Update Configs

on:
  schedule:
    # 每月 1, 5, 9, 13, 17, 21, 25, 29 日运行（近似每4天）
    - cron: '30 22 1,5,9,13,17,21,25,27 * *'
  workflow_dispatch:
    inputs:
      category:
        description: '选择要更新的类别'
        required: false
        type: choice
        options: [all, official, general, smart, mobile, ini]
        default: all

permissions:
  contents: write

jobs:
  update-configs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Install Tree Tool (for INI docs)
        if: ${{ github.event.inputs.category == 'all' || github.event.inputs.category == 'ini' || github.event_name == 'schedule' }}
        run: sudo apt-get install -y tree

      - name: Update Configs
        run: |
          # 1. 赋予脚本执行权限
          chmod +x .github/scripts/*.sh

          # 2. 定义运行判断逻辑
          should_run() {
            local target="$1"
            local input="${{ github.event.inputs.category || 'all' }}"
            local event="${{ github.event_name }}"
            
            if [[ "$event" == "schedule" ]] || [[ "$input" == "all" ]] || [[ "$input" == "$target" ]]; then
              return 0
            fi
            return 1
          }

          # 3. 按需执行脚本
          if should_run "official"; then
            bash .github/scripts/download-official.sh || echo "⚠️ Official update had warnings"
          fi

          if should_run "general"; then
            bash .github/scripts/download-general.sh || echo "⚠️ General update had warnings"
          fi

          if should_run "smart"; then
            bash .github/scripts/download-smart.sh || echo "⚠️ Smart update had warnings"
          fi

          if should_run "mobile"; then
            bash .github/scripts/download-mobile.sh || echo "⚠️ Mobile update had warnings"
          fi

          # 这里的 download-ini.sh 会将文件下载到 Overwrite/THEINI
          if should_run "ini"; then
            bash .github/scripts/download-ini.sh || echo "⚠️ INI update had warnings"
          fi

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # 强制添加 THEYAMLS 和 Overwrite 目录 (包含 THEINI 和 THEOPENCLASH)
          git add THEYAMLS Overwrite || true

          # 检查暂存区是否有变化
          if git diff --cached --quiet; then
            echo "✅ No changes to commit. Workflow finished."
            exit 0
          fi

          git commit -m "🔄 Update configs $(date +'%Y-%m-%d')"
          git push
